name: gainer
description: "Gainer And SIMS powered by Sparecare solution and developed by Mushtakteem Ahmad"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 2.0.0+10
#version: 1.0.0

environment:
  sdk: ^3.5.4

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter


  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  get: ^4.6.6

  #for api and http request
  http: ^1.3.0

  #for url launch or hit a url
  url_launcher: ^6.3.1

  #using catch memory for store data
#  shared_preferences: ^2.4.0
  flutter_secure_storage: ^9.2.3

  #picke image with camera and gallery
  image_picker: ^1.1.2

  #for image cropped in square shape which take from user
#  image_cropper: ^11.0.0

  #provides the ability to load, save, and manipulate images in a variety of image file formats.
#  image: ^4.5.3

  #MediaType  for image or file
#  http_parser: ^4.0.1

  #convert xml response to  json string
  xml: ^6.6.1


  #for check network or internet connectivity
  connectivity_plus: ^6.1.4

  #for date and time   format
  intl: ^0.20.2

  #used locations on the filesystem(find image path or other path)
#  path_provider: ^2.1.5


#  device_info_plus: ^11.2.1
  file_picker: ^10.1.5

  #for check img type automatically
  mime: ^2.0.0

  #for get image path
  path: ^1.9.1

  #for image zoom in and zoom out
#  photo_view: ^0.15.0

  #for image download and etc..
  dio: ^5.8.0+1

  #take permission for storage
  permission_handler: ^12.0.0+1

  #for build graph or chart pi chart
  fl_chart: ^0.71.0

  #for showing skeleton loader in ui
  skeletonizer: ^2.1.0+1

  #for save image/vdo/file in gallery
  gal: ^2.3.2


#  #for excel file read
#  excel: ^4.0.6


  #firebase setting
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^19.1.0
  googleapis_auth: ^2.0.0
#  googleapis: ^14.0.0
  #for accessing cloud firestore database
  cloud_firestore: ^5.6.6
  #for access firebase storage(for upload data in firebase)
  firebase_storage: ^12.4.5
#  change_app_package_name: ^1.5.0

  animated_custom_dropdown: ^3.1.1

  #for scroll the text
#  marquee: ^2.3.0
  #for slider advertisement
  carousel_slider: ^5.1.2




#  #for measurement the box
#  camera: ^0.11.1
#  google_mlkit_object_detection: ^0.15.0
#  arcore_flutter_plugin: ^0.1.0
#  vector_math: ^2.1.4





dev_dependencies:
  flutter_test:
    sdk: flutter

