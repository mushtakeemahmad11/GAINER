plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    // Add the Google services Gradle plugin(firebase)
    id 'com.google.gms.google-services'
}

//for deploy google play
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.sparecare.tel_e_scope"
    compileSdk = 36
    ndkVersion = "27.0.12077973"

    compileOptions {
        //Enable core library desugaring(flutter_local_notification)
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17

    }

    kotlinOptions {
        jvmTarget = "17"
    }


    defaultConfig {
        applicationId = "com.sparecare.tel_e_scope"
        minSdkVersion flutter.minSdkVersion
        targetSdk = 36
        versionCode = 2  //2
        versionName = "1.0.1"
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }

    // code for build app for deploy in play store
    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }

}

flutter {
    source = "../.."
}


dependencies {
    // Import the Firebase BoM
    implementation platform('com.google.firebase:firebase-bom:34.6.0')
    //flutter_local_notification
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'

}


